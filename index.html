<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyPhone</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --border: #38383a;
    --text: #fff;
    --muted: #8e8e93;
    --blue: #007aff;
    --green: #30d158;
    --red: #ff3b30;
    --orange: #ff9f0a;
    --gray-btn: #a5a5a5;
    --tab-h: 64px;
    --header-h: 52px;
  }

  /* ── Lock Screen ── */
  #lock-screen {
    position: fixed; inset: 0; z-index: 999;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }
  #lock-screen.hidden { display: none; }

  .lock-time {
    font-size: 72px; font-weight: 100;
    font-variant-numeric: tabular-nums;
    margin-bottom: 4px;
  }
  .lock-date {
    font-size: 18px; color: var(--muted);
    margin-bottom: 48px;
  }
  .lock-label {
    font-size: 16px; color: var(--muted);
    margin-bottom: 20px;
  }

  .pin-dots {
    display: flex; gap: 20px; margin-bottom: 36px;
  }
  .pin-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid #fff; background: transparent;
    transition: background .15s;
  }
  .pin-dot.filled { background: #fff; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
  }
  .pin-dots.shake { animation: shake .4s ease; }

  .lock-error {
    font-size: 14px; color: var(--red);
    height: 20px; margin-bottom: 8px;
  }

  .lock-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 14px; padding: 0 24px; width: 100%; max-width: 360px;
  }
  .lock-key {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(255,255,255,.12);
    border: none; cursor: pointer; margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
    transition: background .1s;
  }
  .lock-key:active { background: rgba(255,255,255,.28); }
  .lock-key.ghost { background: none; cursor: default; }
  .lock-key .lk-num { font-size: 28px; font-weight: 300; color: #fff; }
  .lock-key .lk-sub { font-size: 9px; letter-spacing: 1.5px; color: var(--muted); }
  .lock-del { font-size: 22px; color: #fff; }

  /* ── Home Screen ── */
  #home-screen {
    position: fixed; inset: 0; z-index: 998;
    background: linear-gradient(160deg, #0d1b2a 0%, #1a1a2e 40%, #16213e 100%);
    display: none; flex-direction: column;
    align-items: center;
  }
  #home-screen.visible { display: flex; }

  .home-status {
    width: 100%; padding: 16px 24px 0;
    display: flex; justify-content: space-between;
    font-size: 13px; color: rgba(255,255,255,.7);
  }

  .home-clock {
    text-align: center; margin-top: 32px; margin-bottom: 48px;
  }
  .home-clock .hc-time {
    font-size: 64px; font-weight: 100;
    font-variant-numeric: tabular-nums; color: #fff;
  }
  .home-clock .hc-date {
    font-size: 16px; color: rgba(255,255,255,.7); margin-top: 4px;
  }

  .app-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px 20px;
    padding: 0 28px;
    width: 100%; max-width: 400px;
  }

  .app-icon {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .app-icon:active .app-icon-img { transform: scale(.9); }

  .app-icon-img {
    width: 72px; height: 72px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
    transition: transform .1s;
  }
  .app-icon-label {
    font-size: 12px; color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,.8);
    text-align: center;
  }

  /* App icon colors */
  .ic-calc  { background: linear-gradient(145deg, #1c1c1e, #3a3a3c); }
  .ic-cam   { background: linear-gradient(145deg, #1c1c1e, #3a3a3c); }
  .ic-phone { background: linear-gradient(145deg, #30d158, #25a244); }
  .ic-notes { background: linear-gradient(145deg, #ffd60a, #c8a800); }
  .ic-clock { background: linear-gradient(145deg, #1c1c1e, #3a3a3c); }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    flex-shrink: 0;
  }
  header h1 { font-size: 17px; font-weight: 600; position: absolute; left: 50%; transform: translateX(-50%); }
  #home-btn {
    font-size: 22px; background: none; border: none;
    cursor: pointer; color: var(--blue); z-index: 1;
    -webkit-tap-highlight-color: transparent;
    padding: 4px 8px;
  }

  #screens { flex: 1; overflow: hidden; position: relative; }

  .screen {
    position: absolute; inset: 0;
    overflow-y: auto;
    display: none;
    background: var(--bg);
  }
  .screen.active { display: flex; flex-direction: column; }

  /* ── Tab Bar ── */
  nav {
    height: var(--tab-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    flex-shrink: 0;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; cursor: pointer; border: none; background: none;
    color: var(--muted); transition: color .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active { color: var(--blue); }
  .tab .icon { font-size: 22px; }
  .tab .label { font-size: 10px; }

  /* ════════════════════════
     CALCULATOR
  ════════════════════════ */
  #calc {
    justify-content: flex-end;
    padding: 0 12px 12px;
  }

  #calc-display {
    padding: 16px 8px;
    text-align: right;
  }
  #calc-display .expr { font-size: 18px; color: var(--muted); min-height: 26px; }
  #calc-display .result {
    font-size: 68px; font-weight: 200;
    line-height: 1; word-break: break-all;
  }

  .calc-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .calc-btn {
    aspect-ratio: 1;
    border-radius: 50%;
    border: none; cursor: pointer;
    font-size: 28px; font-weight: 400;
    color: #fff;
    background: var(--surface2);
    transition: opacity .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .calc-btn:active { opacity: .6; }
  .calc-btn.gray { background: var(--gray-btn); color: #000; }
  .calc-btn.orange { background: var(--orange); }
  .calc-btn.wide {
    grid-column: span 2;
    border-radius: 40px;
    aspect-ratio: unset;
    padding: 0 28px;
    text-align: left;
  }

  /* ════════════════════════
     CAMERA
  ════════════════════════ */
  #camera { background: #000; }

  .cam-tabs {
    display: flex; background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cam-tab {
    flex: 1; padding: 12px; text-align: center;
    cursor: pointer; font-size: 14px; color: var(--muted);
    border: none; background: none;
    -webkit-tap-highlight-color: transparent;
  }
  .cam-tab.active { color: var(--text); background: var(--surface2); }

  #cam-view { flex: 1; position: relative; overflow: hidden; min-height: 0; }

  #cam-view video {
    width: 100%; height: 100%; object-fit: cover;
  }
  #cam-view canvas { display: none; }

  .cam-controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-around;
    padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,.6));
  }
  .shutter {
    width: 72px; height: 72px; border-radius: 50%;
    background: #fff; border: 4px solid #ccc;
    cursor: pointer; transition: transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .shutter:active { transform: scale(.92); }

  .cam-icon-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,.2); border: none;
    font-size: 22px; cursor: pointer; color: #fff;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  #cam-permission {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; padding: 32px;
    text-align: center;
  }
  #cam-permission p { color: var(--muted); font-size: 15px; }

  #gallery-view {
    flex: 1; display: none; overflow-y: auto;
  }
  #gallery-view.visible { display: block; }

  .gallery-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
  }
  .gallery-grid img {
    width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer;
  }
  .gallery-empty {
    padding: 48px; text-align: center; color: var(--muted); font-size: 15px;
  }

  /* lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.95);
    z-index: 100; align-items: center; justify-content: center;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
  #lightbox-close {
    position: absolute; top: 16px; right: 20px;
    font-size: 28px; color: #fff; cursor: pointer; background: none; border: none;
  }

  /* ════════════════════════
     PHONE
  ════════════════════════ */
  #phone {
    align-items: center;
    padding-top: 32px;
  }

  .dial-display {
    min-height: 90px; width: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 0 24px; position: relative;
  }
  #dial-number {
    font-size: 42px; font-weight: 300; color: var(--text);
    letter-spacing: 2px; text-align: center; flex: 1;
  }
  #dial-del {
    font-size: 26px; background: none; border: none;
    color: var(--text); cursor: pointer; padding: 8px;
    visibility: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .dial-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; padding: 0 24px; width: 100%; max-width: 380px;
  }

  .dial-key {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--surface2); border: none;
    cursor: pointer; margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
    transition: opacity .1s;
  }
  .dial-key:active { opacity: .6; }
  .dial-key .num { font-size: 28px; font-weight: 300; color: var(--text); }
  .dial-key .sub { font-size: 9px; letter-spacing: 1.5px; color: var(--muted); margin-top: 1px; }
  .dial-key.empty { background: none; cursor: default; }

  .dial-actions {
    display: flex; align-items: center; justify-content: center;
    gap: 48px; padding: 20px; width: 100%;
  }
  #call-btn {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--green); border: none;
    font-size: 30px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: opacity .1s;
  }
  #call-btn:active { opacity: .7; }

  /* ════════════════════════
     NOTES
  ════════════════════════ */
  #notes { padding: 0; }

  .notes-toolbar {
    padding: 12px 16px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; flex-shrink: 0;
  }
  #note-input {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; color: var(--text); font-size: 15px;
    resize: none; height: 70px; font-family: inherit;
  }
  #note-input::placeholder { color: var(--muted); }
  #note-input:focus { outline: none; border-color: var(--blue); }

  .notes-btn-col { display: flex; flex-direction: column; gap: 6px; }
  .note-action-btn {
    padding: 0 14px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
    height: 30px;
  }
  #note-save { background: var(--blue); color: #fff; }
  #note-cancel { background: var(--surface2); color: var(--text); display: none; }

  #notes-list { flex: 1; overflow-y: auto; padding: 12px 16px; }

  .note-card {
    background: var(--surface);
    border-radius: 12px; padding: 14px;
    margin-bottom: 10px; cursor: pointer;
    border: 1px solid transparent;
    transition: border-color .15s;
  }
  .note-card:hover { border-color: var(--border); }
  .note-body { font-size: 15px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .note-meta { font-size: 11px; color: var(--muted); margin-top: 8px; display: flex; justify-content: space-between; }
  .note-del { background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; }

  .notes-empty { text-align: center; color: var(--muted); margin-top: 48px; font-size: 15px; }

  /* ════════════════════════
     CLOCK
  ════════════════════════ */
  #clock { align-items: center; }

  .clock-tabs {
    display: flex; background: var(--surface);
    border-bottom: 1px solid var(--border);
    width: 100%; flex-shrink: 0;
  }
  .clock-tab {
    flex: 1; padding: 12px; text-align: center;
    cursor: pointer; font-size: 14px; color: var(--muted);
    border: none; background: none;
    -webkit-tap-highlight-color: transparent;
  }
  .clock-tab.active { color: var(--text); background: var(--surface2); }

  #clock-face, #stopwatch-face { width: 100%; }

  #clock-face {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  #clock-time {
    font-size: clamp(52px, 16vw, 80px);
    font-weight: 100; font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
  }
  #clock-date { font-size: 18px; color: var(--muted); }

  #stopwatch-face {
    flex: 1; display: none; flex-direction: column; align-items: center;
  }
  #stopwatch-face.visible { display: flex; }

  #sw-time {
    font-size: clamp(48px, 14vw, 72px);
    font-weight: 100; font-variant-numeric: tabular-nums;
    padding: 32px 0 24px;
  }
  .sw-btns { display: flex; gap: 20px; margin-bottom: 20px; }
  .sw-btn {
    width: 80px; height: 80px; border-radius: 50%;
    border: none; font-size: 15px; font-weight: 600;
    color: #fff; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #sw-start { background: var(--green); }
  #sw-start.running { background: var(--red); }
  #sw-lap { background: var(--surface2); }

  #lap-list { width: 100%; overflow-y: auto; flex: 1; }
  .lap-row {
    display: flex; justify-content: space-between;
    padding: 12px 24px; border-bottom: 1px solid var(--border);
    font-size: 15px; font-variant-numeric: tabular-nums;
  }
  .lap-label { color: var(--muted); }

  /* ── Incoming Call Screen ── */
  #incoming-call {
    display: none; position: fixed; inset: 0; z-index: 1001;
    background: linear-gradient(160deg, #1a1a2e 0%, #0d1b2a 100%);
    flex-direction: column; align-items: center; justify-content: space-between;
    padding: 60px 32px 52px;
  }
  #incoming-call.open { display: flex; }

  .call-top { text-align: center; }
  .call-avatar {
    width: 100px; height: 100px; border-radius: 50%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; margin: 0 auto 20px;
    box-shadow: 0 0 0 8px rgba(255,255,255,.08);
  }
  .call-name { font-size: 34px; font-weight: 300; color: #fff; margin-bottom: 6px; }
  .call-sublabel { font-size: 16px; color: rgba(255,255,255,.6); }

  @keyframes ring-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(48,209,88,.4); }
    50% { box-shadow: 0 0 0 20px rgba(48,209,88,0); }
  }

  .call-actions {
    display: flex; justify-content: space-around; width: 100%;
  }
  .call-btn {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    background: none; border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .call-btn-circle {
    width: 72px; height: 72px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 30px;
  }
  .call-btn-circle.decline { background: var(--red); }
  .call-btn-circle.answer {
    background: var(--green);
    animation: ring-pulse 1.5s ease-in-out infinite;
  }
  .call-btn span { font-size: 13px; color: rgba(255,255,255,.8); }

  /* ── Secret Unlock Popup ── */
  #unlock-popup {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,.75);
    align-items: center; justify-content: center;
  }
  #unlock-popup.open { display: flex; }
  .unlock-box {
    background: var(--surface);
    border-radius: 20px; padding: 32px 28px;
    text-align: center; max-width: 300px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .unlock-box .unlock-emoji { font-size: 52px; margin-bottom: 12px; }
  .unlock-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .unlock-box p { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
  .unlock-ok {
    width: 100%; padding: 14px;
    background: var(--green); color: #fff;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600; cursor: pointer;
  }

  /* ── Utility ── */
  .btn-primary {
    background: var(--blue); color: #fff;
    border: none; border-radius: 10px;
    padding: 13px 24px; font-size: 16px; font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>

<!-- ══ LOCK SCREEN ══ -->
<div id="lock-screen">
  <div class="lock-time" id="lock-time">00:00</div>
  <div class="lock-date" id="lock-date"></div>
  <div class="lock-label">Enter Passcode</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="lock-error" id="lock-error"></div>
  <div class="lock-grid" id="lock-grid"></div>
</div>

<!-- ══ HOME SCREEN ══ -->
<div id="home-screen">
  <div class="home-status">
    <span id="home-status-time"></span>
    <span>⚡</span>
  </div>
  <div class="home-clock">
    <div class="hc-time" id="home-big-time">12:00</div>
    <div class="hc-date" id="home-big-date"></div>
  </div>
  <div class="app-grid">
    <div class="app-icon" onclick="openApp('calc','Calculator')">
      <div class="app-icon-img ic-calc">🧮</div>
      <span class="app-icon-label">Calculator</span>
    </div>
    <div class="app-icon" onclick="openApp('camera','Camera')">
      <div class="app-icon-img ic-cam">📷</div>
      <span class="app-icon-label">Camera</span>
    </div>
    <div class="app-icon" id="phone-icon" onclick="openApp('phone','Phone')" style="display:none">
      <div class="app-icon-img ic-phone">📞</div>
      <span class="app-icon-label">Phone</span>
    </div>
    <div class="app-icon" onclick="openApp('notes','Notes')">
      <div class="app-icon-img ic-notes">📝</div>
      <span class="app-icon-label">Notes</span>
    </div>
    <div class="app-icon" onclick="openApp('clock','Clock')">
      <div class="app-icon-img ic-clock">🕐</div>
      <span class="app-icon-label">Clock</span>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <button id="home-btn" onclick="goHome()" title="Home">⌂</button>
    <h1 id="page-title">Calculator</h1>
    <span style="width:44px"></span>
  </header>

  <div id="screens">

    <!-- ══ CALCULATOR ══ -->
    <section id="calc" class="screen active">
      <div id="calc-display">
        <div class="expr" id="calc-expr"></div>
        <div class="result" id="calc-result">0</div>
      </div>
      <div class="calc-grid" id="calc-grid"></div>
    </section>

    <!-- ══ CAMERA ══ -->
    <section id="camera" class="screen">
      <div class="cam-tabs">
        <button class="cam-tab active" onclick="camMode('live')">📷 Camera</button>
        <button class="cam-tab" onclick="camMode('gallery')" id="gallery-tab">🖼 Gallery (<span id="gallery-count">0</span>)</button>
      </div>
      <div id="cam-view">
        <video id="cam-video" autoplay playsinline muted></video>
        <canvas id="cam-canvas"></canvas>
        <div class="cam-controls">
          <button class="cam-icon-btn" onclick="pickFromLibrary()" title="Library">📂</button>
          <button class="shutter" onclick="takePhoto()" title="Take photo"></button>
          <button class="cam-icon-btn" onclick="flipCamera()" title="Flip">🔄</button>
        </div>

<script>
let phoneUnlocked = false;

function dismissUnlock() {

/* ══════════════════════════════
   INCOMING CALL + RINGTONE
══════════════════════════════ */
let ringCtx = null, ringTimer = null;
const callAudio = new Audio();

function playRingBurst(startTime, duration) {
  if (!ringCtx) return;

  // Two square-wave oscillators for a buzzy ring character
  [900, 1400].forEach(freq => {
    const osc  = ringCtx.createOscillator();
    const gain = ringCtx.createGain();
    // Tremolo LFO at 25 Hz gives the classic "warble"
    const lfo     = ringCtx.createOscillator();
    const lfoGain = ringCtx.createGain();

    osc.type          = 'square';
    osc.frequency.value = freq;
    lfo.type          = 'sine';
    lfo.frequency.value = 25;
    lfoGain.gain.value  = 0.12;

    lfo.connect(lfoGain);
    lfoGain.connect(gain.gain);

    gain.gain.setValueAtTime(0.18, startTime);
    gain.gain.linearRampToValueAtTime(0, startTime + duration);

    osc.connect(gain);
    gain.connect(ringCtx.destination);

    osc.start(startTime);  osc.stop(startTime + duration);
    lfo.start(startTime);  lfo.stop(startTime + duration);
  });
}

function singleRing() {
  if (!ringCtx) return;
  const now = ringCtx.currentTime;
  // "RRING … RRING …" — two 0.45 s bursts, 0.25 s apart, then silence until next interval
  playRingBurst(now,        0.45);
  playRingBurst(now + 0.7,  0.45);
}

function startRing() {
  ringCtx = new (window.AudioContext || window.webkitAudioContext)();
  singleRing();
  ringTimer = setInterval(singleRing, 3500);
}

function stopRing() {
  clearInterval(ringTimer);
  ringTimer = null;
  if (ringCtx) { ringCtx.close(); ringCtx = null; }
}

function triggerIncomingCall() {
  document.getElementById('incoming-call').classList.add('open');
  startRing();
}

function declineCall() {
  document.getElementById('incoming-call').classList.remove('open');
  stopRing();
  callAudio.pause();
  callAudio.currentTime = 0;
}

function answerCall() {
  document.getElementById('incoming-call').classList.remove('open');
  stopRing();
  if (callAudio.src) {
    callAudio.play().catch(() => {});
  }
  openApp('phone', 'Phone');
}

    t.getAttribute('onclick') && t.getAttribute('onclick').includes("'" + id + "'")

  if (id === 'clock') startClock();
}

function goHome() {

function showTab(id, title, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

// Home screen clock

  document.getElementById('home-status-time').textContent = h12 + ':' + pad(m);
  document.getElementById('home-big-date').textContent =
    now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}
tickHomeClock();

// Hide app shell initially — home screen shows after unlock

/* ══════════════════════════════
   CALCULATOR
══════════════════════════════ */
(function() {
  const buttons = [
    { label: 'C',   cls: 'gray' },
    { label: '+/−', cls: 'gray' },
    { label: '%',   cls: 'gray' },
    { label: '÷',   cls: 'orange' },
    { label: '7' }, { label: '8' }, { label: '9' },
    { label: '×',   cls: 'orange' },
    { label: '4' }, { label: '5' }, { label: '6' },
    { label: '−',   cls: 'orange' },
    { label: '1' }, { label: '2' }, { label: '3' },
    { label: '+',   cls: 'orange' },
    { label: '0',   cls: 'wide'  }, { label: '.' },
    { label: '=',   cls: 'orange' },
  ];

  const grid = document.getElementById('calc-grid');
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'calc-btn' + (b.cls ? ' ' + b.cls : '');
    btn.textContent = b.label;
    btn.addEventListener('click', () => calcPress(b.label));
    grid.appendChild(btn);
  });

  let display = '0', prev = null, op = null, fresh = false;
  const opMap = { '÷': '/', '×': '*', '−': '-', '+': '+' };
  const res = document.getElementById('calc-result');
  const expr = document.getElementById('calc-expr');

  // Secret sequence: 3 × 2 ÷ 2 + 6 + 5 + 10 − 3 − 8 − 9
  const SECRET = ['3','×','2','÷','2','+','6','+','5','+','1','0','−','3','−','8','−','9'];
  let history = [];

  function update() { res.textContent = display; }

  window.calcPress = function(btn) {
    if (btn === 'C') {
      display = '0'; prev = null; op = null; fresh = false;
      expr.textContent = ''; history = [];
    } else if (btn in opMap) {
      prev = parseFloat(display); op = opMap[btn]; fresh = true;
      expr.textContent = display + ' ' + btn;
      history.push(btn);
    } else if (btn === '=') {
      if (prev !== null && op) {
        const r = Function('a,b', 'return a ' + op + ' b')(prev, parseFloat(display));
        expr.textContent = '';
        display = String(parseFloat(r.toFixed(10)));
        prev = null; op = null; fresh = false;
        checkSecret();
        history = [];
      }
    } else if (btn === '+/−') {
      display = String(parseFloat(display) * -1);
    } else if (btn === '%') {
      display = String(parseFloat(display) / 100);
    } else if (btn === '.') {
      if (fresh) { display = '0.'; fresh = false; }
      else if (!display.includes('.')) display += '.';
      history.push(btn);
    } else {
      if (fresh || display === '0') { display = btn; fresh = false; }
      else if (display.length < 12) display += btn;
      history.push(btn);
    }
    update();

  function checkSecret() {
    if (history.length !== SECRET.length) return;
    const match = history.every((v, i) => v === SECRET[i]);
    if (match && !phoneUnlocked) {
      phoneUnlocked = true;
      document.getElementById('phone-icon').style.display = 'flex';
      document.getElementById('unlock-popup').classList.add('open');
    }
  }
  };
})();

/* ══════════════════════════════
   CAMERA
══════════════════════════════ */
let stream = null, facingMode = 'environment', photos = [];
const video = document.getElementById('cam-video');
const canvas = document.getElementById('cam-canvas');
const perm = document.getElementById('cam-permission');

function initCamera() {
  if (stream) return;
  perm.style.display = 'flex';
  video.style.display = 'none';
  document.querySelector('.cam-controls').style.display = 'none';
}

async function startCamera() {
  try {
    if (stream) { stream.getTracks().forEach(t => t.stop()); }
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode }, audio: false });
    video.srcObject = stream;
    perm.style.display = 'none';
    video.style.display = 'block';
    document.querySelector('.cam-controls').style.display = 'flex';
  } catch(e) {
    perm.querySelector('p').textContent = 'Camera unavailable: ' + e.message;
  }
}

function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
}

function takePhoto() {
  if (!stream) return;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const uri = canvas.toDataURL('image/jpeg', 0.85);
  addPhoto(uri);
  flashEffect();
}

function addPhoto(uri) {
  photos.unshift(uri);
  document.getElementById('gallery-count').textContent = photos.length;
  renderGallery();
}

function flashEffect() {
  const f = document.createElement('div');
  f.style.cssText = 'position:absolute;inset:0;background:#fff;pointer-events:none;z-index:9';
  document.getElementById('cam-view').appendChild(f);
  setTimeout(() => f.remove(), 120);
}

function pickFromLibrary() {
  document.getElementById('file-input').click();
}

function libraryPicked(e) {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => addPhoto(ev.target.result);
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  const empty = document.getElementById('gallery-empty');
  grid.innerHTML = '';
  empty.style.display = photos.length ? 'none' : 'block';
  photos.forEach((uri, i) => {
    const img = document.createElement('img');
    img.src = uri;
    img.alt = 'Photo ' + (i + 1);
    img.onclick = () => openLightbox(uri);
    grid.appendChild(img);
  });
}

function camMode(mode) {
  const liveView = document.getElementById('cam-view');
  const gallView = document.getElementById('gallery-view');
  document.querySelectorAll('.cam-tab').forEach(t => t.classList.remove('active'));
  if (mode === 'live') {
    liveView.style.display = 'block';
    gallView.classList.remove('visible');
    document.querySelectorAll('.cam-tab')[0].classList.add('active');
    startCamera();
  } else {
    liveView.style.display = 'none';
    gallView.classList.add('visible');
    document.querySelectorAll('.cam-tab')[1].classList.add('active');
    renderGallery();
  }
}

function openLightbox(uri) {
  document.getElementById('lightbox-img').src = uri;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

/* ══════════════════════════════
   PHONE DIALER
══════════════════════════════ */
(function() {
  const keys = [
    ['1',''],['2','ABC'],['3','DEF'],
    ['4','GHI'],['5','JKL'],['6','MNO'],
    ['7','PQRS'],['8','TUV'],['9','WXYZ'],
    ['*',''],['0','+'],['#',''],
  ];
  const grid = document.getElementById('dial-grid');
  keys.forEach(([num, sub]) => {
    const btn = document.createElement('button');
    btn.className = 'dial-key';
    btn.innerHTML = `<span class="num">${num}</span>${sub ? `<span class="sub">${sub}</span>` : ''}`;
    btn.addEventListener('click', () => dialPress(num));
    grid.appendChild(btn);
  });
})();

function dialPress(k) {
  const el = document.getElementById('dial-number');
  if (el.textContent.length >= 15) return;
  el.textContent += k;
  document.getElementById('dial-del').style.visibility = 'visible';
}
function dialDel() {
  const el = document.getElementById('dial-number');
  el.textContent = el.textContent.slice(0, -1);
  if (!el.textContent) document.getElementById('dial-del').style.visibility = 'hidden';
}
function makeCall() {
  const num = document.getElementById('dial-number').textContent;
  if (num) window.location.href = 'tel:' + num;
}

/* ══════════════════════════════
   NOTES
══════════════════════════════ */
let notesData = JSON.parse(localStorage.getItem('notes') || '[]');
let editingId = null;

function saveNotes() { localStorage.setItem('notes', JSON.stringify(notesData)); }

function renderNotes() {
  const list = document.getElementById('notes-list');
  if (!notesData.length) {
    list.innerHTML = '<p class="notes-empty">No notes yet. Write one above!</p>';
    return;
  }
  list.innerHTML = notesData.map(n => `
    <div class="note-card" onclick="editNote(${n.id})">
      <div class="note-body">${escHtml(n.body)}</div>
      <div class="note-meta">
        <span>${fmtDate(n.updated)}</span>
        <button class="note-del" onclick="event.stopPropagation();delNote(${n.id})">🗑</button>
      </div>
    </div>`).join('');
}

function saveNote() {
  const input = document.getElementById('note-input');
  const text = input.value.trim();
  if (!text) return;
  if (editingId !== null) {
    const note = notesData.find(n => n.id === editingId);
    if (note) { note.body = text; note.updated = Date.now(); }
    editingId = null;
    document.getElementById('note-save').textContent = 'Add';
    document.getElementById('note-cancel').style.display = 'none';
  } else {
    notesData.unshift({ id: Date.now(), body: text, updated: Date.now() });
  }
  input.value = '';
  saveNotes(); renderNotes();
}

function editNote(id) {
  const note = notesData.find(n => n.id === id);
  if (!note) return;
  editingId = id;
  document.getElementById('note-input').value = note.body;
  document.getElementById('note-save').textContent = 'Update';
  document.getElementById('note-cancel').style.display = 'block';
  document.getElementById('note-input').focus();
}

function cancelEdit() {
  editingId = null;
  document.getElementById('note-input').value = '';
  document.getElementById('note-save').textContent = 'Add';
  document.getElementById('note-cancel').style.display = 'none';
}

function delNote(id) {
  if (!confirm('Delete this note?')) return;
  notesData = notesData.filter(n => n.id !== id);
  if (editingId === id) cancelEdit();
  saveNotes(); renderNotes();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(ts) {
  return new Date(ts).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

renderNotes();

/* ══════════════════════════════
   CLOCK + STOPWATCH
══════════════════════════════ */
let clockInterval = null;

function startClock() {
  if (clockInterval) return;
  tickClock();
  clockInterval = setInterval(tickClock, 1000);
}

function tickClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock-time').textContent =
    pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  document.getElementById('clock-date').textContent =
    now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}

function clockMode(mode) {
  document.querySelectorAll('.clock-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.clock-tab')[mode === 'clock' ? 0 : 1].classList.add('active');
  document.getElementById('clock-face').style.display = mode === 'clock' ? 'flex' : 'none';
  const sw = document.getElementById('stopwatch-face');
  sw.classList.toggle('visible', mode === 'stopwatch');
}

// Stopwatch
let swRunning = false, swElapsed = 0, swStart = 0, swRaf = null, laps = [];

function swTick() {
  swElapsed = Date.now() - swStart;
  document.getElementById('sw-time').textContent = fmtMs(swElapsed);
  swRaf = requestAnimationFrame(swTick);
}

function swToggle() {
  const btn = document.getElementById('sw-start');
  if (swRunning) {
    cancelAnimationFrame(swRaf);
    swRunning = false;
    btn.textContent = 'Start';
    btn.classList.remove('running');
  } else {
    swStart = Date.now() - swElapsed;
    swRunning = true;
    btn.textContent = 'Stop';
    btn.classList.add('running');
    swTick();
  }
}

function swLap() {
  if (swRunning) {
    laps.unshift({ n: laps.length + 1, t: fmtMs(swElapsed) });
    renderLaps();
  } else {
    swElapsed = 0; laps = [];
    document.getElementById('sw-time').textContent = '00:00.00';
    renderLaps();
  }
}

function renderLaps() {
  document.getElementById('lap-list').innerHTML = laps.map(l =>
    `<div class="lap-row"><span class="lap-label">Lap ${l.n}</span><span>${l.t}</span></div>`
  ).join('');
}

function fmtMs(ms) {
  const pad = (n, d=2) => String(Math.floor(n)).padStart(d,'0');
  return pad(ms/60000) + ':' + pad((ms%60000)/1000) + '.' + pad((ms%1000)/10);
}

// Start clock immediately since it's the default tab
startClock();

/* ══════════════════════════════
   LOCK SCREEN
══════════════════════════════ */
(function() {
  const PASSCODE = '1947';
  let entered = '';

  const keys = [
    ['1',''],['2','ABC'],['3','DEF'],
    ['4','GHI'],['5','JKL'],['6','MNO'],
    ['7','PQRS'],['8','TUV'],['9','WXYZ'],
    [null,''],['0','+'],['del',''],
  ];

  const grid = document.getElementById('lock-grid');
  keys.forEach(([k, sub]) => {
    const btn = document.createElement('button');
    if (k === null) {
      btn.className = 'lock-key ghost';
    } else if (k === 'del') {
      btn.className = 'lock-key';
      btn.innerHTML = '<span class="lock-del">⌫</span>';
      btn.addEventListener('click', () => lockDel());
    } else {
      btn.className = 'lock-key';
      btn.innerHTML = `<span class="lk-num">${k}</span>${sub ? `<span class="lk-sub">${sub}</span>` : ''}`;
      btn.addEventListener('click', () => lockPress(k));
    }
    grid.appendChild(btn);
  });

  function lockPress(digit) {
    if (entered.length >= 4) return;
    entered += digit;
    updateDots();
    if (entered.length === 4) {
      setTimeout(checkCode, 120);
    }
  }

  function lockDel() {
    entered = entered.slice(0, -1);
    updateDots();
    document.getElementById('lock-error').textContent = '';
  }

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById('d' + i).classList.toggle('filled', i < entered.length);
    }
  }

  function checkCode() {
    if (entered === PASSCODE) {
      document.getElementById('lock-screen').classList.add('hidden');
      document.getElementById('home-screen').classList.add('visible');
    } else {
      const dots = document.getElementById('pin-dots');
      dots.classList.add('shake');
      document.getElementById('lock-error').textContent = 'Incorrect passcode';
      setTimeout(() => {
        dots.classList.remove('shake');
        entered = '';
        updateDots();
      }, 420);
    }
  }

  // Lock clock
  function tickLock() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const h = now.getHours(), m = now.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    document.getElementById('lock-time').textContent = h12 + ':' + pad(m) + ' ' + ampm;
    document.getElementById('lock-date').textContent =
      now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }
  tickLock();
  setInterval(tickLock, 1000);
})();
